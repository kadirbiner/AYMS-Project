
{% extends "layout.html" %}
{% load static %}
{% block title %}Alan{% endblock %}

{% block css_style %}
<link rel="stylesheet" href="{% static 'pages/css/styles.css' %}" />
<link rel="stylesheet" href="{% static 'pages/css/alan.css' %}" />{% endblock %}


{% block content %}



<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow-lg p-4" style="width: 100%; max-width: 400px;">
      <h3 class="text-center mb-4">Giriş Yap</h3>
      <form method="POST">
        {% csrf_token %}
        {% if error%}
            <div class="alert alert-danger">
                {{ error}}
            </div>
        {% endif %}
        <div class="mb-3">
          <label for="username" class="form-label">Kullanıcı Adı</label>
          <input type="text" class="form-control" id="username" name="username" required></div>
        
        <div class="mb-3">
          <label for="password" class="form-label">Şifre</label>
          <input type="password" class="form-control" id="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Giriş Yap</button>
      </form>
    </div>
  </div>
  


{% endblock %}

{% block js_script %}{% endblock %}
