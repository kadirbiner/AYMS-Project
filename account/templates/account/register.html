
{% extends "layout.html" %}
{% load static %}
{% block title %}Alan{% endblock %}

{% block css_style %}
<link rel="stylesheet" href="{% static 'pages/css/styles.css' %}" />
<link rel="stylesheet" href="{% static 'pages/css/alan.css' %}" />{% endblock %}


{% block content %}


<br><br>
<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow-lg p-4" style="width: 100%; max-width: 400px;">
      <h3 class="text-center mb-4">Kayıt Ol</h3>
      <form method="POST">
        {% csrf_token %}
        {% if error%}
            <div class="alert alert-danger">
                {{ error}}
            </div>
        {% endif %}
        <div class="mb-3">
          <label for="username" class="form-label">Kullanıcı Adı:</label>
          <input type="text" class="form-control" id="username" name="username" required 
             value="{% if username %}{{username}}{% endif %}">
        </div>
        <div class="mb-3">
            <label for="lastname" class="form-label">soyadı:</label>
            <input type="text" class="form-control" id="lastname" name="lastname" required
             value="{% if lastname %}{{lastname}} {% endif %}">
          </div>
          <div class="mb-3">
            <label for="email" class="form-label">E-mail:</label>
            <input type="text" class="form-control" id="email" name="email" required
             value="{% if email %}{{email}} {% endif %}">
          </div>
          <div class="mb-3">
            <label for="phone" class="form-label">Telefon:</label>
            <input type="text" class="form-control" id="phone" name="phone" required>
          </div>


        <div class="mb-3">
          <label for="password" class="form-label">Şifre:</label>
          <input type="password" class="form-control" id="password" name="password" required>
        </div>
        <div class="mb-3">
            <label for="repassword" class="form-label">Tekrar şifre:</label>
            <input type="repassword" class="form-control" id="repassword" name="repassword" required>
          </div>
        <button type="submit" class="btn btn-primary w-100">Kayıt Ol</button>
      </form>
      
    </div>
  </div>
  <br><br>


{% endblock %}

{% block js_script %}{% endblock %}
